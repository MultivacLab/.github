<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 420" width="1440" height="420" role="img" aria-label="MultivacLab MiniMax-style hero">
  <defs>
    <linearGradient id="bluePink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1456f0"/>
      <stop offset="100%" stop-color="#ea5ec1"/>
    </linearGradient>
    <linearGradient id="softBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="brandGlow" x="-25%" y="-30%" width="150%" height="170%">
