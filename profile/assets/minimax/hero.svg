    </filter>
    <filter id="softShadow" x="-20%" y="-25%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#242424" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1440" height="420" fill="#ffffff"/>
  <circle cx="1168" cy="76" r="110" fill="#bfdbfe" opacity="0.38"/>
  <circle cx="1314" cy="338" r="132" fill="#ea5ec1" opacity="0.10"/>

  <g transform="translate(132 78)">
    <rect x="0" y="0" width="118" height="36" rx="18" fill="#f0f0f0"/>
    <text x="59" y="23" text-anchor="middle" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#18181b">
      MultivacLab
    </text>
    <rect x="132" y="0" width="86" height="36" rx="18" fill="#181e25"/>
    <text x="175" y="23" text-anchor="middle" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff">
