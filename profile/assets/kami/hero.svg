    </filter>
  </defs>

  <rect width="1440" height="420" fill="#f5f4ed"/>
  <rect x="86" y="54" width="1268" height="312" rx="16" fill="#faf9f5" stroke="#e8e6dc" stroke-width="1" filter="url(#whisper)"/>

  <line x1="144" y1="114" x2="1296" y2="114" stroke="#e8e6dc" stroke-width="1"/>
  <line x1="144" y1="306" x2="1296" y2="306" stroke="#e8e6dc" stroke-width="1"/>

  <text x="144" y="94" font-family="Charter, Georgia, Palatino, 'Times New Roman', serif" font-size="14" font-weight="500" fill="#1b365d" letter-spacing="0.4">
