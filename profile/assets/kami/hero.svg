  </text>
  <text x="150" y="286" font-family="'TsangerJinKai02', 'Source Han Serif SC', 'Noto Serif CJK SC', 'Songti SC', Georgia, serif" font-size="25" font-weight="500" fill="#3d3d3a" letter-spacing="0.35">
