<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 420" width="1440" height="420" role="img" aria-label="MultivacLab — AI grocery store">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF6"/>
      <stop offset="100%" stop-color="#F1EDE4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C97855"/>
      <stop offset="100%" stop-color="#9F5D43"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="420" fill="url(#bg)"/>

  <g stroke="#C97855" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="70" x2="1440" y2="70"/>
    <line x1="0" y1="130" x2="1440" y2="130"/>
    <line x1="0" y1="190" x2="1440" y2="190"/>
    <line x1="0" y1="250" x2="1440" y2="250"/>
    <line x1="0" y1="310" x2="1440" y2="310"/>
    <line x1="0" y1="370" x2="1440" y2="370"/>
  </g>

  <rect x="120" y="132" width="6" height="156" fill="url(#accent)" rx="3"/>

  <text x="156" y="222" font-family="'Times New Roman', Georgia, 'Noto Serif SC', serif" font-size="92" font-weight="700" fill="#171615">
    MultivacLab
  </text>

  <text x="158" y="272" font-family="'Times New Roman', Georgia, 'Noto Serif SC', serif" font-size="26" fill="#C97855" font-style="italic">
