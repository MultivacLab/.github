  </text>

  <circle cx="720" cy="264" r="3" fill="#171615" fill-opacity="0.35"/>

  <text x="740" y="272" font-family="'PingFang SC', 'Noto Serif SC', 'Songti SC', serif" font-size="24" fill="#171615" fill-opacity="0.66">
