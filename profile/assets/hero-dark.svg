  <rect x="120" y="132" width="6" height="156" fill="url(#accent)" rx="3"/>

  <text x="156" y="222" font-family="'Times New Roman', Georgia, 'Noto Serif SC', serif" font-size="92" font-weight="700" fill="#FAFAF6">
